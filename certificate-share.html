<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Certificate | Enamul Haque Skill Passport</title>
  <meta name="description" content="Shared Enamul Haque Skill Passport certificate page." />
  <link rel="icon" href="assets/ehsp-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#123a73;--navy-dark:#0c2951;--gold:#c9a24a;--line:#d6dde8;--ink:#1f2f46;--muted:#5d6c81}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#eef3f9,#f7f8fb);color:var(--ink);padding:1.2rem}.top-actions{max-width:1120px;margin:0 auto 1rem;display:flex;gap:.7rem;justify-content:space-between;align-items:center;flex-wrap:wrap}.button{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;padding:.8rem 1.1rem;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:var(--navy);color:#fff}.secondary{background:#fff;color:var(--navy);border:1px solid var(--line)}.certificate{position:relative;width:1120px;max-width:100%;margin:0 auto;background:#fff;border:12px solid var(--navy);border-radius:22px;box-shadow:0 30px 70px rgba(18,58,115,.18);overflow:hidden}.certificate:before{content:"";position:absolute;inset:16px;border:2px solid rgba(201,162,74,.65);border-radius:14px;pointer-events:none}.inner{position:relative;z-index:1;padding:1.45rem 2.3rem 1.5rem}.top{display:flex;justify-content:space-between;align-items:center;gap:1.2rem;border-bottom:1px solid #e8edf5;padding-bottom:.85rem}.brand{display:flex;align-items:center;gap:.8rem}.brand img{width:70px;height:70px;object-fit:contain;border-radius:50%;background:#fff}.brand strong{display:block;color:var(--navy-dark);font-size:1.25rem}.brand span{display:block;color:var(--muted);margin-top:.15rem;font-size:.9rem}.tag{padding:.55rem .8rem;border-radius:999px;background:#eef4ff;color:var(--navy);font-weight:800;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}.content{text-align:center;padding:1.3rem 0 1rem}.eyebrow{color:var(--gold);text-transform:uppercase;letter-spacing:.22em;font-weight:800;font-size:.78rem}.title{margin:.55rem 0 0;font-family:"Playfair Display",Georgia,serif;color:var(--navy-dark);font-size:3.15rem;line-height:1.05}.subtitle{max-width:720px;margin:.65rem auto 0;color:var(--muted);line-height:1.5;font-size:.92rem}.learner{margin:1rem 0 0;font-family:"Playfair Display",Georgia,serif;color:var(--navy);font-size:2.25rem;line-height:1.05}.line{width:500px;max-width:80%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.45rem auto .75rem}.statement{max-width:820px;margin:.65rem auto 0;line-height:1.55;font-size:.92rem}.statement strong{color:var(--navy-dark)}.pill{display:inline-block;margin-top:.8rem;padding:.55rem .9rem;border-radius:999px;background:#faf6eb;border:1px solid rgba(201,162,74,.45);color:var(--navy-dark);font-weight:700;font-size:.9rem}.meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.75rem;margin-top:1.15rem}.meta-card{padding:.8rem .7rem;border:1px solid var(--line);border-radius:12px;background:#fbfcfe}.meta-card span{display:block;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.meta-card strong{display:block;color:var(--navy-dark);margin-top:.3rem;font-size:.86rem;line-height:1.3}.bottom{display:grid;grid-template-columns:1.05fr .95fr;gap:1rem;align-items:end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid #e8edf5}.verify{text-align:left;color:var(--muted);line-height:1.45;font-size:.86rem}.verify strong{display:block;color:var(--navy-dark);margin-bottom:.25rem}.sig{text-align:center;justify-self:end;min-width:270px}.sig img{max-width:210px;max-height:66px;width:auto;height:auto;object-fit:contain;filter:contrast(1.1)}.sig-line{height:1px;background:#cad5e4;margin:.25rem 0 .45rem}.sig strong{display:block;color:var(--navy-dark);font-size:.95rem}.sig span{display:block;color:var(--muted);margin-top:.15rem;line-height:1.35;font-size:.82rem}.footer{margin-top:.9rem;padding-top:.55rem;border-top:1px dashed #d9e1ed;text-align:center;color:var(--muted);font-size:.72rem;line-height:1.4}.missing{max-width:900px;margin:2rem auto;padding:1.5rem;border:1px solid #f1c6c6;border-radius:1.2rem;background:#fff1f1;color:#8a1f1f}.share-note{max-width:1120px;margin:.8rem auto 0;color:var(--muted);font-size:.9rem;text-align:center;line-height:1.5}@media(max-width:860px){body{padding:.8rem}.inner{padding:1.2rem}.top,.bottom{display:grid;grid-template-columns:1fr}.brand{justify-content:center;text-align:center;flex-direction:column}.tag{justify-self:center}.meta{grid-template-columns:repeat(2,minmax(0,1fr))}.verify,.sig{text-align:center;justify-self:center}.title{font-size:2.25rem}.learner{font-size:1.85rem}}
  </style>
</head>
<body>
  <div class="top-actions"><a class="button secondary" href="index.html">Back To Portal</a><button class="button primary" type="button" id="copyBtn">Copy This Link</button></div>
  <div id="certificateHost"></div>
  <p class="share-note">Public share page. This MVP page does not display learner email or private registration data. Full tamper proof verification will be added when backend certificate tracking is introduced.</p>
  <script>
    const params=new URLSearchParams(window.location.search);const name=params.get('n'),score=params.get('s'),total=params.get('t')||'50',issueDate=params.get('d'),certId=params.get('id');const host=document.getElementById('certificateHost');
    if(!name||!score||!issueDate||!certId){host.innerHTML='<div class="missing"><h1>Certificate link incomplete</h1><p>This shared certificate link is missing required certificate details.</p></div>';}else{host.innerHTML=`<section class="certificate" aria-label="Shared Skill Passport Certificate"><div class="inner"><div class="top"><div class="brand"><img src="assets/ehsp-logo.png" alt="Enamul Haque Skill Passport logo"/><div><strong>Enamul Haque Skill Passport</strong><span>Free Open Learning Recognition Initiative</span></div></div><div class="tag">Shared Certificate</div></div><div class="content"><div class="eyebrow">Open Learning Recognition</div><h1 class="title">Certificate of Achievement</h1><p class="subtitle">This certifies that the learner named below has successfully completed the assessment requirements for the following learning pathway.</p><div class="learner">${decodeURIComponent(name)}</div><div class="line"></div><p class="statement">has successfully passed the assessment for <strong>CSE For Non CSE Students</strong> and completed <strong>Module 1: Computer Science Fundamentals</strong> as part of the open learning recognition journey.</p><div class="pill">Result: Passed with ${score} out of ${total}</div><div class="meta"><div class="meta-card"><span>Course</span><strong>CSE For Non CSE Students</strong></div><div class="meta-card"><span>Module</span><strong>Module 1 Computer Science Fundamentals</strong></div><div class="meta-card"><span>Issue Date</span><strong>${decodeURIComponent(issueDate)}</strong></div><div class="meta-card"><span>Certificate ID</span><strong>${decodeURIComponent(certId)}</strong></div></div></div><div class="bottom"><div class="verify"><strong>Verification</strong>This shared certificate displays the certificate ID shown above. Formal backend verification will be introduced in the next platform stage.</div><div class="sig"><img src="assets/enamul_haque_signature.png" alt="Signature of Enamul Haque"/><div class="sig-line"></div><strong>Enamul Haque</strong><span>Founder and Issuer<br/>Enamul Haque Skill Passport</span></div></div><div class="footer"><strong>Recognition Note:</strong> This certificate recognises open learning achievement and assessment success within Enamul Haque Skill Passport. It does not represent a university degree or external academic accreditation.</div></div></section>`;}
    document.getElementById('copyBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(window.location.href);alert('Share link copied.');}catch(e){prompt('Copy this share link:',window.location.href);}});
  </script>
</body>
</html>
